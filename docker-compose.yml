services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order_api_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    networks:
      - order_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: order_api_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - order_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: order_api_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: order_payment_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - order_network

networks:
  order_network:
    driver: bridge

volumes:
  db_data: